
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCode | Professional Command Environment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #020617;
            --accent-primary: #6366f1;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-obsidian);
            color: #f8fafc;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .jetbrains-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nexus-gradient-text {
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-shimmer {
            background: linear-gradient(90deg, #6366f1 0%, #fff 50%, #6366f1 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 4s linear infinite;
        }

        @keyframes textShimmer {
            to { background-position: 200% center; }
        }

        .window-control {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }
        .window-control:hover { transform: scale(1.1); }
        .ctrl-close { background: #ff5f57; }
        .ctrl-min { background: #febc2e; }
        .ctrl-max { background: #28c840; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(99, 102, 241, 0.03), transparent);
            animation: scanline 4s linear infinite;
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes player-bing {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }
        .animate-bing {
            animation: player-bing 0.6s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .suggestion-menu {
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
        }
    </style>
<script type="importmap">
{

}
